name: Create Discussions for Galaxy Brain

on:
  workflow_dispatch:

permissions:
  discussions: write

jobs:
  create-discussion:
    runs-on: ubuntu-latest
    steps:
      - name: Create Discussion 1
        uses: actions/github-script@v7
        with:
          script: |
            const query = `
              mutation($repositoryId: ID!, $categoryId: ID!, $body: String!, $title: String!) {
                createDiscussion(input: {
                  repositoryId: $repositoryId,
                  categoryId: $categoryId,
                  body: $body,
                  title: $title
                }) {
                  discussion {
                    id
                    number
                  }
                }
              }
            `;
            const variables1 = {
              repositoryId: 'R_kgDOR_HAcg',
              categoryId: 'DIC_kwDOR_HAcs4C8bAh',
              title: 'How to setup Docker for local development?',
              body: 'I am trying to run this project locally, but I am facing issues with Docker. Could you explain the steps to configure PostgreSQL and Redis properly using the docker-compose file?'
            };
            const result1 = await github.graphql(query, variables1);
            console.log('Created Discussion 1:', result1);

            const variables2 = {
              repositoryId: 'R_kgDOR_HAcg',
              categoryId: 'DIC_kwDOR_HAcs4C8bAh',
              title: 'Best practices for handling audio streaming?',
              body: 'What are the recommended best practices for implementing efficient audio streaming in Next.js? I am curious about caching strategies with Redis.'
            };
            const result2 = await github.graphql(query, variables2);
            console.log('Created Discussion 2:', result2);
