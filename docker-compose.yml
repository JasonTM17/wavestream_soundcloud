name: wavestream

x-api-env: &api-env
  NODE_ENV: production
  ALLOW_WEAK_LOCAL_SECRETS: ${ALLOW_WEAK_LOCAL_SECRETS:-true}
  PORT: 4000
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-wavestream}
  DB_PASSWORD: ${DB_PASSWORD:-wavestream_secret}
  DB_NAME: ${DB_NAME:-wavestream}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-wavestream}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-wavestream_secret}
  MINIO_USE_SSL: 'false'
  MINIO_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-32chars}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-32chars}
  JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
  JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
  FRONTEND_URL: http://localhost:${WEB_PORT:-3000},http://127.0.0.1:3101,http://localhost:3101
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_FROM: ${SMTP_FROM:-WaveStream <noreply@wavestream.local>}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wavestream.local}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
  ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-WaveStream Admin}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-wavestream-admin}
  DEFAULT_CREATOR_ROLE: ${DEFAULT_CREATOR_ROLE:-creator}

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: wavestream-db
    restart: unless-stopped
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-wavestream}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wavestream_secret}
      POSTGRES_DB: ${DB_NAME:-wavestream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-wavestream}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: wavestream-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: wavestream-minio
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wavestream}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wavestream_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: wavestream-minio-init
    depends_on:
      minio:
        condition: service_started
    restart: on-failure
    entrypoint:
      [
        '/bin/sh',
        '-ec',
        'until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-wavestream} $${MINIO_ROOT_PASSWORD:-wavestream_secret}; do echo "Waiting for MinIO..."; sleep 2; done; mc mb --ignore-existing local/wavestream-audio; mc mb --ignore-existing local/wavestream-images; mc anonymous set download local/wavestream-audio; mc anonymous set download local/wavestream-images; echo "MinIO buckets initialized";',
      ]

  mailpit:
    image: ghcr.io/axllent/mailpit:latest
    container_name: wavestream-mailpit
    restart: unless-stopped
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${MAILPIT_WEB_PORT:-8025}:8025'
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_WEB_BIND_ADDR: 0.0.0.0:8025
    volumes:
      - mailpit_data:/data

  api-migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: build
    container_name: wavestream-api-migrate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: *api-env
    command: ['pnpm', '--filter', 'api', 'migration:run']

  api-seed:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: build
    container_name: wavestream-api-seed
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    environment: *api-env
    command: ['pnpm', '--filter', 'api', 'seed']

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: wavestream-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api-seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: wavestream-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_MINIO_URL: http://localhost:${MINIO_API_PORT:-9000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: wavestream-postgres-data
  redis_data:
    name: wavestream-redis-data
  minio_data:
    name: wavestream-minio-data
  mailpit_data:
    name: wavestream-mailpit-data
